{% extends "base.html" %}
{% block content %}
<div class="auth-box glass-panel">
    <h2>Welcome Back!</h2>
    <p>Sign in to your ModernBank account</p>
    
    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" required placeholder="Enter your email">
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required placeholder="Enter your password">
            <i class="fa-solid fa-eye password-toggle"></i>
        </div>

        <div class="form-group" style="display:flex; justify-content:space-between; align-items:center;">
            <div>
                <input type="checkbox" id="remember" name="remember">
                <label for="remember" style="display:inline; font-weight:normal;">Remember Me</label>
            </div>
            <a href="#" style="color:var(--primary-color); font-size:0.9rem; text-decoration:none;">Forgot Password?</a>
        </div>
        
        <button type="submit" class="btn btn-primary">Sign In</button>
    </form>
    
    <div class="auth-footer">
        Don't have an account? <a href="{{ url_for('register') }}">Create one here</a>
    </div>
</div>
{% endblock %}
